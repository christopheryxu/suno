<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Questrial&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno AI Adoption Plan</title>
<link rel="icon" type="image/jpeg" href="public/Suno Favicon.jpeg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: url('public/Suno Hero.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Manrope', sans-serif;
    color: #ffffff;
  }
  #wave-bg {
    display: none;
  }
  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.4) 40%,
      rgba(0,0,0,0.95) 100%
    );
  }
  #logo-link {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    align-items: center;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }
  #logo-link:hover {
    opacity: 0.7;
  }
  #logo {
    height: 40px;
  }

  /* Pages */
  .page {
    display: none;
    position: relative;
    z-index: 2;
    padding-top: 140px;
    padding-bottom: 60px;
  }
  .page.active {
    display: block;
  }

  /* Home */
  #page-home {
    min-height: 100vh;
  }

  /* Artifacts */
  #slides {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }
  .slide-wrapper {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .slide-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .slide-nav-btn {
    width: 40px;
    height: 72px;
    border: 1px solid #333;
    background: #1B1B1D;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    font-family: 'Questrial', sans-serif;
    font-size: 16px;
    color: #ffffff;
    transition: color 0.2s;
    overflow: hidden;
  }
  .slide-nav-btn::before {
    content: '';
    position: absolute;
    width: 72px;
    height: 40px;
    background: url('public/Suno Horizontal.jpg') center center / cover no-repeat;
    transform: rotate(90deg);
    z-index: 0;
  }
  .slide-nav-btn svg {
    position: relative;
    z-index: 1;
  }
  .slide-nav-btn.slide-nav-down::before {
    transform: rotate(-90deg);
  }
  .slide-nav-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }
  .slide-nav-btn svg {
    transition: transform 0.25s ease;
  }
  .slide-nav-btn:hover svg {
    transform: scaleY(1.2);
  }
  .slide {
    width: 60vw;
    aspect-ratio: 16 / 9;
    background: #000000;
    border: 1px solid #272729;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    container-type: inline-size;
    overflow: hidden;
    padding: 3cqw;
    font-size: 2cqw;
    cursor: pointer;
    transition: border-color 0.2s ease;
  }
  .slide:hover {
    border-color: #444;
  }
  .slide-flex {
    display: flex;
    flex-direction: column;
  }
  .slide-header {
    display: flex;
    align-items: flex-start;
    gap: 16cqw;
  }
  .slide-logo-wrap {
    flex-shrink: 0;
    align-self: stretch;
  }
  .slide-logo {
    height: 100%;
    width: auto;
    display: block;
    transform: scale(0.85);
  }
  .slide-title {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 4.5cqw;
    line-height: 1.1;
    color: #fff;
    text-align: left;
    max-width: 60%;
    word-wrap: break-word;
  }
  .slide-title-full {
    max-width: 100%;
    white-space: nowrap;
  }
  .underline-pink {
    text-decoration: underline;
    text-decoration-color: #999;
    text-decoration-thickness: 3px;
    text-underline-offset: 0.15em;
  }
  .highlight {
    background-color: #e8e8e8;
  }
  .underline-orange {
    text-decoration: underline;
    text-decoration-color: #888;
    text-decoration-thickness: 3px;
    text-underline-offset: 0.15em;
  }
  .underline-green {
    text-decoration: underline;
    text-decoration-color: #777;
    text-decoration-thickness: 3px;
    text-underline-offset: 0.15em;
  }
  .highlight-pink {
    background-color: #d0d0d0;
  }
  .highlight-orange {
    background-color: #c8c8c8;
  }
  .highlight-blue {
    background-color: #bbb;
  }
  .highlight-green {
    background-color: #ddd;
  }
  .highlight, .highlight-pink, .highlight-orange, .highlight-blue, .highlight-green {
    transition: transform 0.3s ease;
    display: inline-block;
    cursor: pointer;
  }
  .highlight:hover, .highlight-pink:hover, .highlight-orange:hover, .highlight-blue:hover, .highlight-green:hover {
    transform: scale(1.05);
  }
  .slide-subtitle {
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 4cqw;
    line-height: 1.3;
    color: #fff;
    text-align: left;
    max-width: 100%;
    margin-top: 8cqw;
  }
  .slide-divider {
    border: none;
    height: max(0.15cqw, 1px);
    background: #1a1a1a;
    margin: 5cqw 0;
  }
  .slide-box {
    margin-top: 0;
    height: 20cqw;
    padding: 2cqw 2cqw 2cqw 0;
    display: flex;
    align-items: stretch;
    gap: 2cqw;
  }
  .slide-box-icon {
    flex-shrink: 0;
    height: 100%;
    width: auto;
    transition: filter 0.3s ease;
    cursor: pointer;
  }
  .slide-box-icon:hover {
    filter: invert(1);
  }
  .slide-box-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .slide-box-title {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 4cqw;
    color: #fff;
    flex: 1;
  }
  .slide-box-desc {
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 2.5cqw;
    line-height: 1.3;
    color: rgba(255,255,255,0.7);
  }
  .slide-meta {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 2.5cqw;
    color: #fff;
    text-align: left;
    margin-top: 12cqw;
  }
  .slide-cases {
    display: flex;
    gap: 2cqw;
    margin-top: 2cqw;
    flex: 1;
  }
  .slide-case {
    flex: 1;
    border: 1px solid #1a1a1a;
    border-top: 3px solid;
    padding: 2cqw;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .slide-case:not(.slide-case-toponly) {
    cursor: pointer;
  }
  .slide-case:not(.slide-case-toponly):hover {
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    z-index: 1;
  }
  .slide-case:nth-child(1) { border-top-color: #999; }
  .slide-case:nth-child(2) { border-top-color: #777; }
  .slide-case:nth-child(3) { border-top-color: #555; }
  .slide-case:nth-child(4) { border-top-color: #333; }
  .slide-case:nth-child(5) { border-top-color: #fff; }
  .slide-vdivider {
    width: max(0.15cqw, 1px);
    background: #1a1a1a;
    align-self: stretch;
  }
  .slide-case-toponly {
    border-left: none;
    border-right: none;
    border-bottom: none;
  }
  .slide-case-logo {
    width: 5cqw;
    height: 5cqw;
    object-fit: contain;
    margin-bottom: 1.5cqw;
  }
  .slide-case-title {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 2.5cqw;
    color: #fff;
  }
  .slide-cases-footer {
    padding: 2cqw 2cqw 2cqw 2cqw;
    margin-top: 0;
    border: none;
    border-left: 3px solid #999;
  }
  .slide-cases-footer .slide-box-title {
    font-size: 2.5cqw;
    flex: none;
  }
  .slide-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2cqw;
    margin-top: 2.5cqw;
    flex: 1;
  }
  .slide-grid-cell {
    padding: 1.5cqw 2cqw;
    border-left: 3px solid;
  }
  .slide-grid-cell:nth-of-type(1) { border-left-color: #999; }
  .slide-grid-cell:nth-of-type(2) { border-left-color: #777; }
  .slide-grid-cell:nth-of-type(3) { border-left-color: #555; }
  .slide-grid-cell:nth-of-type(4) { border-left-color: #333; }
  .slide-grid-divider {
    margin: 1.5cqw 0 0 0;
  }
  .slide-grid-svg {
    width: 100%;
    height: 4cqw;
    margin-top: 1cqw;
  }
  .slide-stacked-rows {
    display: flex;
    flex-direction: column;
    margin-top: 0;
    flex: none;
  }
  .slide-two-col {
    display: flex;
    gap: 3cqw;
  }
  .slide-two-col-left {
    flex: 0 0 auto;
  }
  .slide-two-col-right {
    flex: 1;
  }
  .slide-topic-box {
    padding: 0.8cqw 2cqw 0.8cqw 0;
    display: flex;
    align-items: center;
    gap: 0.8cqw;
  }
  .slide-topic-box .slide-row-icon {
    width: 1.8cqw;
    height: 1.8cqw;
    padding: 0.4cqw;
  }
  .slide-topic-box .slide-box-desc {
    font-size: 1.35cqw;
  }
  .slide-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    border-left: 3px solid;
    padding: 0 0 0 2cqw;
    min-height: 5cqw;
    margin-bottom: 2cqw;
  }
  .slide-stacked-rows .slide-row:nth-of-type(1) { border-left-color: #999; }
  .slide-stacked-rows .slide-row:nth-of-type(2) { border-left-color: #777; }
  .slide-stacked-rows .slide-row:nth-of-type(3) { border-left-color: #555; }
  .slide-stacked-rows .slide-row:nth-of-type(4) { border-left-color: #333; margin-bottom: 0; }
  .slide-divider-row {
    margin: 2cqw 0 2cqw 1.5cqw;
  }
  .slide-row-icon {
    width: 3.5cqw;
    height: 3.5cqw;
    flex-shrink: 0;
    margin-right: 2cqw;
    background: #1a1a1a;
    padding: 0.8cqw;
    box-sizing: content-box;
  }
  .slide-row-icon path,
  .slide-row-icon rect,
  .slide-row-icon circle {
    stroke: #fff;
  }
  .slide-row-title {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 2.5cqw;
    color: #fff;
    white-space: nowrap;
    width: 30%;
    flex-shrink: 0;
  }
  .slide-row-desc {
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 1.35cqw;
    line-height: 1.3;
    color: rgba(255,255,255,0.7);
  }
  .slide-cases-footer .slide-box-desc {
    font-size: 1.8cqw;
    margin-top: 1.5cqw;
  }
  .slide-case-desc {
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 1.5cqw;
    line-height: 1.3;
    color: rgba(255,255,255,0.7);
    margin-top: 1cqw;
  }
  .timeline-day {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.4cqw;
  }
  .timeline-desc {
    font-size: 1.55cqw;
  }
  .slide-timeline {
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 2cqw;
    margin-top: 7cqw;
    margin-bottom: 7cqw;
    height: 0;
  }
  .slide-timeline-line-svg {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 2px;
    width: 100%;
  }
  .slide-timeline-line-div {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 2px;
    left: calc(2cqw + 1.25cqw);
    right: calc(2cqw + 1.25cqw);
    background: linear-gradient(to right, #999, #333);
  }
  .slide-timeline-nodes {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin: 0;
    position: relative;
    z-index: 1;
    height: 100%;
  }
  .slide-timeline-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: none;
    height: 100%;
    position: relative;
  }
  .slide-timeline-num {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 2.5cqw;
    height: 2.5cqw;
    z-index: 2;
    overflow: visible;
  }
  .slide-timeline-node:nth-child(1) .slide-timeline-num circle { fill: #999; }
  .slide-timeline-node:nth-child(2) .slide-timeline-num circle { fill: #8a8a8a; }
  .slide-timeline-node:nth-child(3) .slide-timeline-num circle { fill: #7a7a7a; }
  .slide-timeline-node:nth-child(4) .slide-timeline-num circle { fill: #6b6b6b; }
  .slide-timeline-node:nth-child(5) .slide-timeline-num circle { fill: #5c5c5c; }
  .slide-timeline-node:nth-child(6) .slide-timeline-num circle { fill: #4d4d4d; }
  .slide-timeline-node:nth-child(7) .slide-timeline-num circle { fill: #3e3e3e; }
  .slide-timeline-node.active .slide-timeline-num circle {
    stroke: #E65126;
    stroke-width: 10;
  }
  .slide-timeline-label {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.3cqw;
    color: #fff;
    text-align: center;
    line-height: 1.2;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 10cqw;
  }
  .slide-timeline-node:nth-child(odd) .slide-timeline-label {
    top: calc(50% + 1.25cqw + 0.5cqw);
  }
  .slide-timeline-node:nth-child(even) .slide-timeline-label {
    bottom: calc(50% + 1.25cqw + 0.5cqw);
  }
  .slide-timeline-node:first-child .slide-timeline-num {
    left: 0;
    transform: translateY(-50%);
    position: absolute;
    top: 50%;
  }
  .slide-timeline-node:first-child .slide-timeline-label {
    left: 0;
    transform: none;
    text-align: left;
  }
  .slide-timeline-node:last-child .slide-timeline-num {
    right: 0;
    left: auto;
    transform: translateY(-50%);
    position: absolute;
    top: 50%;
  }
  .slide-timeline-node:last-child .slide-timeline-label {
    left: auto;
    right: 0;
    transform: none;
    text-align: right;
  }
  .slide-timeline-detail {
    display: flex;
    flex-direction: column;
    margin-top: 2cqw;
    flex: none;
  }
  .slide-timeline-detail-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.5cqw;
  }
  .slide-timeline-detail-item {
    display: flex;
    align-items: center;
    gap: 1.2cqw;
  }
  .slide-timeline-detail-num {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.3cqw;
    color: #fff;
    width: 2.2cqw;
    height: 2.2cqw;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .slide-timeline-detail-text {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.6cqw;
    color: #fff;
  }
  .slide-toggle-wrap {
    display: flex;
    flex-direction: column;
    gap: 2cqw;
  }
  .slide-toggle {
    position: relative;
    display: inline-flex;
    background: #e8e8e8;
    border-radius: 2cqw;
    padding: 0.3cqw;
    width: 22cqw;
    cursor: pointer;
  }
  .slide-toggle-option {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.6cqw;
    line-height: 1;
    color: #fff;
    padding: 1cqw 0;
    position: relative;
    z-index: 1;
    transition: color 0.3s ease;
    cursor: pointer;
    user-select: none;
  }
  .slide-toggle-option.active {
    color: #fff;
  }
  .slide-toggle-slider {
    position: absolute;
    top: 0.3cqw;
    left: 0.3cqw;
    width: calc(50% - 0.6cqw);
    height: calc(100% - 0.6cqw);
    background: #EB7422;
    border-radius: 1.7cqw;
    transition: transform 0.3s ease;
  }
  .slide-toggle.future .slide-toggle-slider {
    transform: translateX(calc(100% + 0.6cqw));
  }
  .slide-toggle-3 {
    width: 42cqw;
  }
  .slide-toggle-3 .slide-toggle-slider {
    width: calc(33.333% - 0.4cqw);
  }
  .slide-toggle-3.pos-1 .slide-toggle-slider {
    transform: translateX(calc(100% + 0.3cqw));
  }
  .slide-toggle-3.pos-2 .slide-toggle-slider {
    transform: translateX(calc(200% + 0.6cqw));
  }
  .slide-dropdown {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0.8cqw;
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.4cqw;
    padding: 0.4cqw 1.2cqw;
    border: 1px solid #ccc;
    border-radius: 0.5cqw;
    background: #fff;
    color: #fff;
    cursor: pointer;
    user-select: none;
  }
  .slide-dropdown:hover {
    border-color: #999;
  }
  .slide-dropdown-arrow {
    width: 0;
    height: 0;
    border-left: 0.7cqw solid transparent;
    border-right: 0.7cqw solid transparent;
    border-top: 0.8cqw solid #ffffff;
  }
  .slide-dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 0.3cqw);
    left: 0;
    min-width: 18cqw;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 0.5cqw;
    overflow: hidden;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .slide-dropdown.open .slide-dropdown-menu {
    display: block;
  }
  .slide-dropdown-item {
    font-family: 'Questrial', sans-serif;
    font-weight: 600;
    font-size: 1.4cqw;
    padding: 0.4cqw 1.2cqw;
    cursor: pointer;
    transition: background 0.15s ease;
    position: relative;
  }
  .slide-dropdown-item:hover {
    background: #f0f0f0;
  }
  .slide-dropdown-item.active {
    background: #e8e8e8;
  }
  .slide-dropdown-drawer {
    padding-left: 1.5cqw;
    background: #f8f8f8;
  }
  .slide-dropdown-sub {
    font-size: 1.2cqw;
  }
  .slide-dropdown-parent {
    font-weight: 600;
  }
  .slide-toggle-panel {
    display: none;
  }
  .slide-toggle-panel.active {
    display: block;
  }
  .slide-tooltip {
    text-decoration: underline;
    text-decoration-color: #E64082;
    color: #E64082;
    cursor: pointer;
    position: relative;
  }
  .slide-tooltip:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    font-family: 'Manrope', sans-serif;
    font-size: 1cqw;
    font-weight: 400;
    padding: 0.4cqw 0.7cqw;
    border-radius: 0.3cqw;
    white-space: normal;
    width: max-content;
    max-width: 20cqw;
    z-index: 20;
    margin-bottom: 0.4cqw;
  }
  .slide-checklist {
    margin-top: 1cqw;
  }
  .slide-checklist-panel {
    display: none;
  }
  .slide-checklist-panel.active {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, auto);
    gap: 0 3cqw;
  }
  .slide-checklist-panel[data-step="2"].active {
    grid-auto-flow: row;
    grid-template-rows: none;
  }
  .slide-checklist-item {
    display: flex;
    align-items: baseline;
    gap: 0.8cqw;
    font-family: 'Manrope', sans-serif;
    font-weight: 400;
    font-size: 1.3cqw;
    color: #fff;
    padding: 0.45cqw 0;
    cursor: pointer;
  }
  .slide-checklist-item input[type="checkbox"]:checked + span {
    text-decoration: line-through;
    opacity: 0.5;
  }
  .slide-checklist-item input[type="checkbox"] {
    width: clamp(6px, 0.65vw, 10px);
    height: clamp(6px, 0.65vw, 10px);
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #fff;
  }
  .slide-accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .slide-accordion-icon {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 2.5cqw;
    line-height: 1;
    color: #fff;
    user-select: none;
  }
  .slide-number {
    position: absolute;
    bottom: 1.5cqw;
    right: 2cqw;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 1.8cqw;
    color: #fff;
  }
  @media (max-width: 768px) {
    .slide-nav-btn {
      width: 24px;
      height: 44px;
    }
    .slide-nav-btn svg {
      width: 10px;
      height: 24px;
    }
    #logo-link {
      top: 20px;
    }
    #logo {
      height: 20px;
    }
    .page {
      padding-top: 60px;
    }
    .slide-title {
      font-size: 3.5cqw;
    }
    .slide-subtitle {
      font-size: 3.2cqw;
    }
    .slide:first-child .slide-subtitle,
    .slide:nth-child(2) .slide-subtitle {
      font-size: 3.5cqw;
    }
    .slide:first-child .slide-subtitle {
      margin-top: 10cqw;
    }
    .slide-box-title {
      font-size: 3.2cqw;
    }
    .slide-case-title {
      font-size: 2cqw;
    }
    .slide-meta {
      font-size: 2cqw;
      margin-top: 10cqw;
    }
    .slide-two-col > .slide-two-col-left > .slide-case-title,
    .slide-two-col > .slide-two-col-right > .slide-case-title {
      font-size: 2.8cqw !important;
    }
    .underline-pink,
    .underline-orange,
    .underline-green {
      text-decoration-thickness: 2px;
    }
    .slide-case {
      border-top-width: 2px;
    }
    .slide-grid-cell {
      border-left-width: 2px;
    }
    .slide-row {
      border-left-width: 2px;
    }
    .slide-cases-footer {
      border-left-width: 2px;
    }
    .slide-checklist-item input[type="checkbox"] {
      width: 4px;
      height: 4px;
      min-width: 4px;
      min-height: 4px;
      max-width: 4px;
      max-height: 4px;
      border-width: 0.5px;
      border-radius: 0;
    }
    .slide-checklist-item {
      padding: 0.2cqw 0;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>
  <canvas id="wave-bg"></canvas>
  <div id="bg-overlay"></div>
  <a href="#home" id="logo-link">
    <img id="logo" src="public/Suno White Logo.svg" alt="Suno">
  </a>

  <!-- Page: Home -->
  <div id="page-home" class="page">
    <div id="slides">
      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">What Are We Doing?</div>
        <span class="slide-number">1</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Why Are We Doing It?</div>
        <span class="slide-number">2</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">How Will this Work?</div>
        <span class="slide-number">3</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Adoption Team Goals</div>
        <div style="display:flex; gap:2cqw; margin-top:3cqw; flex:1; align-items:stretch;">
          <div style="flex:1; border:1px solid #272729; border-radius:1cqw; padding:2cqw; background:#1B1B1D; display:flex; align-items:center; justify-content:center;">
            <div class="slide-case-title" style="font-size:2.5cqw;">Growth</div>
          </div>
          <div style="flex:1; border:1px solid #272729; border-radius:1cqw; padding:2cqw; background:#1B1B1D; display:flex; align-items:center; justify-content:center;">
            <div class="slide-case-title" style="font-size:2.5cqw;">People</div>
          </div>
          <div style="flex:1; border:1px solid #272729; border-radius:1cqw; padding:2cqw; background:#1B1B1D; display:flex; align-items:center; justify-content:center;">
            <div class="slide-case-title" style="font-size:2.5cqw;">Legal</div>
          </div>
          <div style="flex:1; border:1px solid #272729; border-radius:1cqw; padding:2cqw; background:#1B1B1D; display:flex; align-items:center; justify-content:center;">
            <div class="slide-case-title" style="font-size:2.5cqw;">Finance</div>
          </div>
        </div>
        <span class="slide-number">4</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">AI Best Practices</div>
        <span class="slide-number">5</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Agent Best Practices</div>
        <span class="slide-number">6</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Tracking Usage</div>
        <span class="slide-number">7</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Guardrails & Costs</div>
        <span class="slide-number">8</span>
      </div>

      <div class="slide slide-flex">
        <div class="slide-title slide-title-full">Timeline</div>
        <div class="slide-meta" style="margin-top:2cqw; font-size:2.5cqw;">30-60-90 Timeline</div>
        <span class="slide-number">9</span>
      </div>

    </div>
  </div>

  <!-- Page: Interviews -->
  <div id="page-interviews" class="page"></div>

  <!-- Page: Mentors -->
  <div id="page-mentors" class="page"></div>

  <!-- Page: Events -->
  <div id="page-events" class="page"></div>

  <!-- Page: Artifacts -->
  <div id="page-playbooks" class="page"></div>

  <script>
    // Timeline step dropdown
    (function() {
      var dropdown = document.getElementById('timeline-step-dropdown');
      if (!dropdown) return;
      var title = document.getElementById('timeline-step-title');
      var weekLabel = document.getElementById('timeline-step-week');
      var weekMap = {1:'Week 1', 2:'Week 1-2', 3:'Week 2', 4:'Week 3-4', 5:'Week 4-5', 6:'Week 6'};
      var items = dropdown.querySelectorAll('.slide-dropdown-item');
      var nodes = document.querySelectorAll('.slide-timeline-node');
      // Set initial active node
      if (nodes.length > 0) nodes[0].classList.add('active');
      dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      items.forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.stopPropagation();
          title.textContent = item.textContent;
          items.forEach(function(i) { i.classList.remove('active'); });
          item.classList.add('active');
          dropdown.classList.remove('open');
          var val = parseInt(item.getAttribute('data-value'));
          nodes.forEach(function(n) { n.classList.remove('active'); });
          if (nodes[val - 1]) nodes[val - 1].classList.add('active');
          if (weekLabel && weekMap[val]) weekLabel.textContent = weekMap[val];
          var panels = document.querySelectorAll('.slide-checklist-panel');
          panels.forEach(function(p) { p.classList.remove('active'); p.style.display = 'none'; });
          var stepKey = '' + val;
          var activePanel = document.querySelector('.slide-checklist-panel[data-step="' + stepKey + '"]');
          if (activePanel) { activePanel.classList.add('active'); activePanel.style.display = 'grid'; }
        });
      });
      nodes.forEach(function(node, idx) {
        node.style.cursor = 'pointer';
        node.addEventListener('click', function() {
          var val = idx + 1;
          items.forEach(function(i) { i.classList.remove('active'); });
          if (items[idx]) items[idx].classList.add('active');
          title.textContent = items[idx] ? items[idx].textContent : '';
          nodes.forEach(function(n) { n.classList.remove('active'); });
          node.classList.add('active');
          if (weekLabel && weekMap[val]) weekLabel.textContent = weekMap[val];
          var panels = document.querySelectorAll('.slide-checklist-panel');
          panels.forEach(function(p) { p.classList.remove('active'); p.style.display = 'none'; });
          var activePanel = document.querySelector('.slide-checklist-panel[data-step="' + val + '"]');
          if (activePanel) { activePanel.classList.add('active'); activePanel.style.display = 'grid'; }
        });
      });
      document.addEventListener('click', function() {
        dropdown.classList.remove('open');
      });
    })();

    // Tech modality dropdown
    (function() {
      var dropdown = document.getElementById('tech-modality-dropdown');
      if (!dropdown) return;
      var selected = dropdown.querySelector('.slide-dropdown-selected');
      var parents = dropdown.querySelectorAll('.slide-dropdown-parent');
      var subs = dropdown.querySelectorAll('.slide-dropdown-sub');
      var drawers = dropdown.querySelectorAll('.slide-dropdown-drawer');
      dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      parents.forEach(function(parent) {
        parent.addEventListener('click', function(e) {
          e.stopPropagation();
          var val = parent.getAttribute('data-value');
          drawers.forEach(function(d) {
            if (d.getAttribute('data-parent') === val) {
              d.style.display = d.style.display === 'none' ? 'block' : 'none';
            } else {
              d.style.display = 'none';
            }
          });
        });
      });
      var techPanels = document.querySelectorAll('.slide-tech-panel');
      subs.forEach(function(sub) {
        sub.addEventListener('click', function(e) {
          e.stopPropagation();
          selected.textContent = sub.textContent;
          subs.forEach(function(s) { s.classList.remove('active'); });
          parents.forEach(function(p) { p.classList.remove('active'); });
          sub.classList.add('active');
          dropdown.classList.remove('open');
          drawers.forEach(function(d) { d.style.display = 'none'; });
          var val = sub.getAttribute('data-value');
          techPanels.forEach(function(p) {
            if (p.getAttribute('data-tech') === val) {
              p.classList.add('active');
              p.style.display = 'block';
            } else {
              p.classList.remove('active');
              p.style.display = 'none';
            }
          });
        });
      });
      document.addEventListener('click', function() { dropdown.classList.remove('open'); });
    })();

    // Domain use-case dropdown
    (function() {
      var dropdown = document.getElementById('domain-usecase-dropdown');
      if (!dropdown) return;
      var selected = dropdown.querySelector('.slide-dropdown-selected');
      var items = dropdown.querySelectorAll('.slide-dropdown-item');
      dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      var metricsPanel = document.getElementById('domain-metrics-panel');
      var personasPanel = document.getElementById('domain-personas-panel');
      items.forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.stopPropagation();
          selected.textContent = item.textContent;
          items.forEach(function(i) { i.classList.remove('active'); });
          item.classList.add('active');
          dropdown.classList.remove('open');
          var val = item.getAttribute('data-value');
          if (metricsPanel) metricsPanel.style.display = val === 'metrics' ? 'block' : 'none';
          if (personasPanel) personasPanel.style.display = val === 'personas' ? 'block' : 'none';
        });
      });
      document.addEventListener('click', function() { dropdown.classList.remove('open'); });
    })();



    // Accordion
    (function() {
      var headers = document.querySelectorAll('.slide-accordion-header');
      headers.forEach(function(header) {
        header.addEventListener('click', function() {
          var accordion = header.parentElement;
          var body = accordion.querySelector('.slide-accordion-body');
          var icon = header.querySelector('.slide-accordion-icon');
          if (body.style.display === 'none') {
            body.style.display = 'block';
            icon.textContent = '−';
          } else {
            body.style.display = 'none';
            icon.textContent = '+';
          }
        });
      });
    })();

    // BD Toggle
    (function() {
      var toggle = document.getElementById('bd-toggle');
      if (!toggle) return;
      var panels = ['awareness', 'consideration', 'conversion'];
      var options = toggle.querySelectorAll('.slide-toggle-option');
      options.forEach(function(opt, idx) {
        opt.addEventListener('click', function() {
          var target = opt.getAttribute('data-target');
          options.forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          toggle.classList.remove('future', 'pos-1', 'pos-2');
          if (idx === 1) toggle.classList.add('pos-1');
          if (idx === 2) toggle.classList.add('pos-2');
          panels.forEach(function(p) {
            document.getElementById('bd-toggle-' + p).style.display = p === target ? 'block' : 'none';
          });
        });
      });
    })();

    // Custom dropdown
    (function() {
      var dropdown = document.getElementById('fde-dropdown');
      if (!dropdown) return;
      var selected = dropdown.querySelector('.slide-dropdown-selected');
      var items = dropdown.querySelectorAll('.slide-dropdown-item');
      dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      var descs = document.querySelectorAll('.slide-dropdown-desc');
      items.forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.stopPropagation();
          selected.textContent = item.textContent;
          items.forEach(function(i) { i.classList.remove('active'); });
          item.classList.add('active');
          dropdown.classList.remove('open');
          var val = item.getAttribute('data-value');
          descs.forEach(function(d) {
            if (d.getAttribute('data-desc') === val) {
              d.classList.add('active');
              d.style.display = 'block';
            } else {
              d.classList.remove('active');
              d.style.display = 'none';
            }
          });
          var rowsEnterprise = document.getElementById('rows-enterprise');
          var rowsMidMarket = document.getElementById('rows-mid-market');
          var rowsInternal = document.getElementById('rows-internal');
          if (rowsEnterprise) rowsEnterprise.style.display = val === 'enterprise' ? 'flex' : 'none';
          if (rowsMidMarket) rowsMidMarket.style.display = val === 'mid-market' ? 'flex' : 'none';
          if (rowsInternal) rowsInternal.style.display = val === 'internal' ? 'flex' : 'none';
        });
      });
      document.addEventListener('click', function() {
        dropdown.classList.remove('open');
      });
    })();

    // Toggle
    (function() {
      var toggle = document.getElementById('role-toggle');
      if (!toggle) return;
      var options = toggle.querySelectorAll('.slide-toggle-option');
      options.forEach(function(opt) {
        opt.addEventListener('click', function() {
          var target = opt.getAttribute('data-target');
          options.forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
          if (target === 'future') {
            toggle.classList.add('future');
          } else {
            toggle.classList.remove('future');
          }
          var roleWrap = toggle.closest('.slide-toggle-wrap');
          roleWrap.querySelectorAll('.slide-toggle-panel').forEach(function(p) { p.classList.remove('active'); p.style.display = 'none'; });
          var panel = document.getElementById('toggle-' + target);
          panel.classList.add('active');
          panel.style.display = 'block';
        });
      });
    })();

    // Router
    function navigate() {
      var hash = location.hash.replace('#', '') || 'home';
      var pages = document.querySelectorAll('.page');
      pages.forEach(function(p) { p.classList.remove('active'); });
      var target = document.getElementById('page-' + hash);
      if (target) {
        target.classList.add('active');
      } else {
        document.getElementById('page-home').classList.add('active');
      }

      // Update active menu item
      var links = document.querySelectorAll('#menu a');
      links.forEach(function(a) {
        var linkHash = a.getAttribute('href').replace('#', '');
        if (linkHash === hash) {
          a.classList.add('active');
        } else {
          a.classList.remove('active');
        }
      });

      window.scrollTo(0, 0);
    }

    window.addEventListener('hashchange', navigate);
    navigate();

    // Slide navigation arrows
    (function() {
      var slides = document.querySelectorAll('.slide');
      slides.forEach(function(slide, i) {
        var wrapper = document.createElement('div');
        wrapper.className = 'slide-wrapper';
        slide.parentNode.insertBefore(wrapper, slide);
        wrapper.appendChild(slide);

        var nav = document.createElement('div');
        nav.className = 'slide-nav';

        if (i > 0) {
          var upBtn = document.createElement('button');
          upBtn.className = 'slide-nav-btn';
          upBtn.innerHTML = '<svg viewBox="0 0 24 48" width="18" height="44" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="miter"><line x1="12" y1="44" x2="12" y2="8" fill="none"/><polygon points="6,16 12,4 18,16"/></svg>';
          upBtn.onclick = function() {
            var prevWrapper = wrapper.previousElementSibling;
            if (prevWrapper) prevWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
          };
          nav.appendChild(upBtn);
        }

        if (i < slides.length - 1) {
          var downBtn = document.createElement('button');
          downBtn.className = 'slide-nav-btn slide-nav-down';
          downBtn.innerHTML = '<svg viewBox="0 0 24 48" width="18" height="44" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linejoin="miter"><line x1="12" y1="4" x2="12" y2="40" fill="none"/><polygon points="6,32 12,44 18,32"/></svg>';
          downBtn.onclick = function() {
            var nextWrapper = wrapper.nextElementSibling;
            if (nextWrapper) nextWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
          };
          nav.appendChild(downBtn);
        }

        wrapper.appendChild(nav);

        slide.onclick = function() {
          wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };
      });
    })();

    // Scroll-driven background fade to black
    (function() {
      var overlay = document.getElementById('bg-overlay');
      window.addEventListener('scroll', function() {
        var scrollFrac = Math.min(window.scrollY / (document.body.scrollHeight - window.innerHeight), 1);
        var darkness = scrollFrac * 0.95;
        overlay.style.background = 'linear-gradient(to bottom, rgba(0,0,0,' + (darkness * 0.5) + ') 0%, rgba(0,0,0,' + (0.4 + darkness * 0.5) + ') 40%, rgba(0,0,0,' + (0.5 + darkness) + ') 100%)';
      });
    })();

    // Wave background
    (function() {
      var canvas = document.getElementById('wave-bg');
      var ctx = canvas.getContext('2d');
      var lineCount = 18;
      var seed = [];
      for (var i = 0; i < lineCount; i++) {
        seed.push({
          amp: 40 + Math.random() * 120,
          freq: 0.002 + Math.random() * 0.003,
          phase: Math.random() * Math.PI * 2,
          yOffset: (i / (lineCount - 1)) * 1.4 - 0.2,
          speed: 0.0003 + Math.random() * 0.0006,
          drift: 0.001 + Math.random() * 0.002,
          opacity: 0.06 + Math.random() * 0.1
        });
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var w = canvas.width;
        var h = canvas.height;

        for (var i = 0; i < lineCount; i++) {
          var s = seed[i];
          var baseY = h * s.yOffset;
          ctx.beginPath();
          for (var x = 0; x <= w; x += 2) {
            var nx = x / w;
            var envelope = Math.sin(nx * Math.PI);
            var y = baseY
              + Math.sin(x * s.freq + s.phase + t * s.speed) * s.amp * envelope
              + Math.sin(x * s.freq * 2.3 + t * s.drift) * s.amp * 0.3 * envelope;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = 'rgba(180, 180, 180, ' + s.opacity + ')';
          ctx.lineWidth = 0.6 + Math.random() * 0.3;
          ctx.stroke();
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();

  </script>
</body>
</html>
